# AMD APML / SB-RMI (drivers/misc/amd-sbi/) is intentionally NOT enabled.
# Investigation (2026-06) proved it is unusable on this board: the device at
# i2c2 0x3C answers reg 0x20=0x17 but NAKs its CTRL/STATUS regs and the MP1
# power mailbox, so the driver probe fails -EIO; the stock firmware ships
# SUPPORT_APML_IFC=0 (OEM disabled APML); and AM4/X570 silicon does not expose
# the EPYC-class SB-RMI power mailbox to the BMC. It provided no working sensor
# (the "CPU Temp" reading comes from the W83773G @ i2c1 0x4C, not SB-RMI), and
# enabling it only logged repeated probe failures every boot.
#
# (CONFIG_SENSORS_W83773G is already enabled in the upstream
# meta-aspeed/.../aspeed-g5/defconfig — no override needed here.
# CONFIG_SENSORS_SBTSI is intentionally NOT enabled: SB-TSI conventionally
# lives at i2c:0x4c, the same address as the W83773G chip on this board.)
# CONFIG_AMD_SBRMI_I2C is not set
# CONFIG_AMD_SBRMI_HWMON is not set

# Fan / sensor IC drivers covering the common candidates on AMD server
# boards. The X570D4I-2T has SOMETHING handling the FAN1/2/3 headers that
# isn't the AST2500 PWM/Tach controller alone (verified by direct-register
# sweep with zero tach response on all 8 AST PWM/tach channels). Likely
# candidates we want the kernel to recognize on whichever i2c bus they
# sit on:
#   - NCT6775-family (NCT6779D / NCT6796D / NCT6798D) over i2c
#   - NCT7802Y (Nuvoton purpose-built server HW-monitor)
#   - LM85/EMC2305 fan controllers
CONFIG_SENSORS_NCT6775_CORE=y
CONFIG_SENSORS_NCT6775_I2C=y
CONFIG_SENSORS_NCT7802=y
CONFIG_SENSORS_LM85=y
CONFIG_SENSORS_EMC2305=y

# Disable the legacy monolithic g_mass_storage gadget. Built in, the kernel
# auto-binds it to every aspeed usb-vhub UDC at boot with no backing file,
# spamming "no file given for LUN0" + "failed to start g_mass_storage: -22"
# on ports p1..p5. Virtual media uses the configfs composite gadget
# (CONFIG_USB_F_MASS_STORAGE / CONFIG_USB_CONFIGFS_MASS_STORAGE, kept enabled),
# so nothing is lost.
# CONFIG_USB_MASS_STORAGE is not set

# DDR4 SPD (EE1004) on i2c7 0x50-0x53 for native SPD reads
CONFIG_EEPROM_EE1004=y

# USB host-interface gadget functions. RNDIS is the windows-compatible function
# the AMI BIOS Redfish Host Interface driver binds (usb_network.sh builds it with
# the MS "RNDIS over USB" class + MS OS descriptors). NCM is kept for a Linux
# host OS. CONFIG_USB_CONFIGFS_RNDIS selects CONFIG_USB_F_RNDIS.
CONFIG_USB_CONFIGFS_NCM=y
CONFIG_USB_F_RNDIS=y
CONFIG_USB_CONFIGFS_RNDIS=y
