# Keep the AST2500 LPC Super-I/O (host I/O 0x4E/0x4F) decode enabled.
#
# The host BIOS (AMI) Redfish Host Interface driver (RedfishHi) probes an LPC
# Super-I/O at ports 0x4E/0x4F, selects logical device 0x0D (the iLPC2AHB
# bridge) and reads AST2500 GPIO E4 via AHB 0x1E780020 bit4. If that read does
# not return 1 it aborts the host Redfish-over-USB interface before bringing up
# any networking. By default u-boot's isolate_bmc() sets SCU70 bit20
# (SCU_HWSTRAP_LPC_SIO_DEC_DIS) to disable the Super-I/O decode; enabling this
# Kconfig keeps that decode on. (The companion patch
# 0001-ast2500-keep-ilpc2ahb-enabled-with-superio.patch additionally keeps the
# iLPC2AHB bridge — HICRB bit6 — enabled, which the stock u-boot disables
# unconditionally regardless of this option.)
#
# ASPEED_ENABLE_SUPERIO sits inside `if ASPEED_ALLOW_DANGEROUS_BACKDOORS` in
# arch/arm/mach-aspeed/Kconfig, so the parent symbol must be enabled too or
# Kconfig silently drops ENABLE_SUPERIO. (This is intentionally a "dangerous
# backdoor": the iLPC2AHB grants the host read access to BMC address space; it
# is required here for the host Redfish Host Interface.)
CONFIG_ASPEED_ALLOW_DANGEROUS_BACKDOORS=y
CONFIG_ASPEED_ENABLE_SUPERIO=y
