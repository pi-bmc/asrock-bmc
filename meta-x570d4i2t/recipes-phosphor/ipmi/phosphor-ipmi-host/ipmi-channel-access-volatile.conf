# Pre-seed the IPMI volatile channel-access file from the shipped default.
# /run is tmpfs (cleared every boot), so on the first read phosphor-ipmi-host
# logs "JSON file '/run/ipmi/channel_access_volatile.json' not found" (INFO) and
# then creates it from /usr/share/ipmi-providers/channel_access.json anyway.
# systemd-tmpfiles runs at sysinit (before ipmid), so seeding it here makes the
# file present on first read and silences the message. Content is identical to
# what ipmid would fall back to.
d /run/ipmi 0755 root root -
C /run/ipmi/channel_access_volatile.json 0644 root root - /usr/share/ipmi-providers/channel_access.json
